        <h1 class="font-display text-8xl md:text-9xl font-bold text-accent mb-6">
            404
        </h1>

        <!-- Error Message -->

        <!-- Back to Home Button -->

            class="inline-block bg-transparent border-2 border-primary text-primary px-8 py-3.5 text-xs font-semibold tracking-widest uppercase hover:bg-primary hover:text-white hover:border-primary transition-all"

        </a>
