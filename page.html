<!-- Page Section -->
{% if page.metafields.builder.json == true %}
<section class="page-builder">
    {{ page.body }}
</section>
{% else %}
<section class="py-10 md:py-16 min-h-[80vh] bg-card">
    <div class="max-w-4xl mx-auto px-5">
        <!-- Page Title -->
        <h1 class="font-display text-3xl md:text-4xl font-semibold text-center mb-12">
            {{ page.title }}
        </h1>

        <!-- Page Content -->
        <div class="prose prose-lg max-w-none">
            {{ page.body }}
        </div>
    </div>
</section>
{% endif %}
