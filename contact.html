<!-- Contact Page Section -->
<section class="py-10 md:py-16 min-h-[80vh] bg-card">
    <div class="max-w-4xl mx-auto px-5">
        <!-- Page Title -->
        <h1 class="font-display text-3xl md:text-4xl font-semibold text-center mb-6">
            {{ page.title }}
        </h1>

        <!-- Page Content (optional intro text) -->
        {% if page.body %}
        <div class="prose prose-lg max-w-none text-center mb-12">
            {{ page.body }}
        </div>
        {% endif %}

        <!-- Contact Form -->
        <div class="max-w-xl mx-auto">
            <!-- Success Message -->
            {% if message.success %}
            <div class="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg text-center mb-6">
                {{ message.success }}
            </div>
            {% endif %}

            <!-- Error Message -->
            {% if message.error %}
            <div class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg text-center mb-6">
                {{ message.error }}
            </div>
            {% endif %}

            {{ form_open('pages/' ~ page.permalink, { method: 'post', class: 'space-y-6', id: 'contact-form' }) }}

                <!-- Name Field -->
                <div>
                    <label for="name" class="block text-sm font-medium text-accent mb-2">Name <span class="text-red-500">*</span></label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        required
                        class="w-full px-4 py-3 border border-secondary-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="Your name"
                    >
                </div>

                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-accent mb-2">Email <span class="text-red-500">*</span></label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        class="w-full px-4 py-3 border border-secondary-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="your@email.com"
                    >
                </div>

                <!-- Phone Field (Optional) -->
                <div>
                    <label for="phone" class="block text-sm font-medium text-accent mb-2">Phone <span class="text-secondary text-xs">(optional)</span></label>
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        class="w-full px-4 py-3 border border-secondary-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="+60123456789"
                    >
                </div>

                <!-- Message Field -->
                <div>
                    <label for="message" class="block text-sm font-medium text-accent mb-2">Message <span class="text-red-500">*</span></label>
                    <textarea
                        id="message"
                        name="message"
                        rows="5"
                        required
                        minlength="10"
                        class="w-full px-4 py-3 border border-secondary-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all resize-none"
                        placeholder="How can we help you?"
                    ></textarea>
                </div>

                <!-- Captcha -->
                {{ captcha() }}

                <!-- Submit Button -->
                <div class="text-center">
                    <button
                        type="submit"
                        id="contact-submit"
                        class="inline-block bg-primary text-white px-10 py-4 text-sm font-semibold tracking-wider uppercase hover:bg-primary/90 transition-all cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        Send Message
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

<script>
document.getElementById('contact-form').addEventListener('submit', function() {
    var btn = document.getElementById('contact-submit');
    btn.disabled = true;
    btn.textContent = 'Sending...';
});
</script>
